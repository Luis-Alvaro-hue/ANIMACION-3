<html>
    <head>
        <title></title>
        <style>
            *{
                margin: 0px;
                padding: 0px;
            }
            .contenedor{
                width: 1000px;
                height: 300px;
                background-color: #000000;
                position: relative;
                margin: 0 auto;
                border: 1px solid black;
                overflow: hidden;
            }
            .marco1{
                width: 200px;
                height: 300px;
                background-color: red;
                position: absolute;
                top: -300px;
                left: -200px;
                animation: marco1 2s 1 forwards;
                background-image: url(img/dk8aG.jpg);
                background-size: cover;
            }
            .marco2{
                width: 200px;
                height: 300px;
                background-color: green;
                position: absolute;
                top: 400px;
                left: -200px;
                animation: marco2 2s 1 forwards 2s;
                background-image: url(img/e4dDN.jpg);
                background-size: cover;
            }
            .marco3{
                width: 200px;
                height: 300px;
                background-color: yellow;
                position: absolute;
                top: -300px;
                left: 400px;
                animation: marco3 2s 1 forwards 4s;
                background-image: url(img/YnQCm.jpg);
                background-size: cover;
            }
            .marco4{
                width: 200px;
                height: 300px;
                background-color: blue;
                position: absolute;
                top: 300px;
                left: 1000px;
                animation: marco4 2s 1 forwards 6s;
                background-image: url(img/SvKxc.jpg);
                background-size: cover;
            }
            .marco5{
                width: 200px;
                height: 300px;
                background-color: pink;
                position: absolute;
                top: -300px;
                left: 1000px;
                animation: marco5 2s 1 forwards 8s;
                background-image: url(img/oAwTg.jpg);
                background-size: cover;
            }
            .marco1, .marco2, .marco3, .marco4, .marco5{
                box-shadow: 0px 0px 20px rgb(0, 26, 255);
            }
            .texto{ 
                width: 1000px;
                height: 50px;
                background-color: rgba(37, 245, 234, 0.514);
                position: absolute;
                top: 600px;
                left: 0px;
                z-index: 10;
                animation: texto 2s 1 forwards 9s;
                color: blue;
                font-size: 30px;
                font-family: Arial;
                text-align: center;
                line-height: 50px;
                font-weight: bold;
            }

            .btn-regresar{
                display: block;
                width: 260px;
                margin: 25px auto;
                padding: 14px;
                text-align: center;
                text-decoration: none;
                background: linear-gradient(135deg,#2563eb,#38bdf8);
                color: white;
                font-weight: bold;
                border-radius: 12px;
                box-shadow: 0 8px 20px rgba(0,0,0,0.4);
                transition: 0.3s;
            }
            .btn-regresar:hover{
                transform: translateY(-4px);
                background: linear-gradient(135deg,#1d4ed8,#0ea5e9);
            }
            @keyframes marco1{
                0%{
                    top: -300px;
                    left: -200px;
                    transform: rotateY(180deg);
                }
                100%{
                    top: 0px;
                    left: 0px;
                }
            }
            @keyframes marco2{
                0%{
                    top: 400px;
                    left: -200px;
                    transform: rotateY(180deg);
                }
                50%{
                    top: 0px;
                    left: 200px;
                }
                100%{
                    top: 0px;
                    left: 200px;
                }
            }
            @keyframes marco3{
                0%{
                    top: -300px;
                    left: 400px;
                    transform: rotateY(180deg);
                }
                50%{
                    top: 300px;
                    left: 400px;
                }
                100%{
                    top: 0px;
                    left: 400px;
                }
            }
            @keyframes marco4{
                0%{
                    top: 300px;
                    left: 1000px;
                    transform: rotateY(180deg);
                }
                100%{
                    top: 0px;
                    left: 600px;
                }
            }
            @keyframes marco5{
                0%{
                    top: -300px;
                    left: 1000px;
                    transform: rotateY(180deg);
                }
                100%{
                    top: 0px;
                    left: 800px;
                }
            }
            @keyframes texto{
                0%{
                    opacity: 0;
                    top: -50px;
                    left: 0px;
                }
                100%{
                    opacity: 1;
                    top: 200px;
                    left: 0px;
                }
            }
        </style>
    </head>
    <body>
        <div class="contenedor">
            <div class="marco1"></div>
            <div class="marco2"></div>
            <div class="marco3"></div>
            <div class="marco4"></div>
            <div class="marco5"></div>
            <div class="texto">TECNOLOGIAS DE DESARROLLO WEB</div>
        </div>
        <a href="index.html" class="btn-regresar">VOLVER AL INICIO</a>
    </body>
</html>
