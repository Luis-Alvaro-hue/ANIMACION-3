<html>
<head>
    <title>ANIMACION 3 CSS</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
        }
        .contenedor{
            width: 400px;
            height: 200px;
            border: 1px solid black;
            position: relative; /* para centrar el div */
            margin: 0 auto; /* para centrar el div */
            overflow: hidden;/*muestra solo lo interior*/
        }

        .cuadrito{
            width: 100px;
            height: 100px;
            background-color: red;
            position: absolute;/* permite mover el div dentro del contenedor */
            top: 50px;
            left: -100px;
            animation: cuadrito 3s infinite ease-in;
        }
        
        .btn-regresar{
            display: block;
            width: 260px;
            margin: 25px auto;
            padding: 14px;
            text-align: center;
            text-decoration: none;
            background: linear-gradient(135deg,#2563eb,#38bdf8);
            color: white;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: 0.3s;
        }
        
        .btn-regresar:hover{
            transform: translateY(-4px);
            background: linear-gradient(135deg,#1d4ed8,#0ea5e9);
        }
        @keyframes cuadrito{
            from{
                left: -100px
            }
            to{
                left: 500px;
            }
        }

    </style>
</head>
<body>
    <div class="contenedor">

        <div class="cuadrito"></div>

    </div>
    <a href="index.html" class="btn-regresar">VOLVER AL INICIO</a>
</body>
</html>
