<html>
<head>
    <title>ANIMACION 3 CSS</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
        }
        .contenedor{
            width: 400px;
            height: 200px;
            border: 1px solid black;
            position: relative; /* para centrar el div */
            margin: 0 auto; /* para centrar el div */
            overflow: hidden;/*muestra solo lo interior*/
        }

        .cuadrito{
            width: 100px;
            height: 100px;
            background-color: rgb(155, 28, 28);
            position: absolute;/* permite mover el div dentro del contenedor */
            top: 0px;
            left: 0px;
            animation: cuadrito 3s infinite linear;
        }

        @keyframes cuadrito{
            from{
                top: -100px;
                left :-100px;
            }
            to{
                top: 300px;
                left: 600px;
            }
        }

    </style>
</head>
<body>
    <div class="contenedor">

        <div class="cuadrito"></div>

    </div>

</body>
</html>
