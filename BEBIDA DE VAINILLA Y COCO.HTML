<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Animación Coco Vainilla Exacta - Corregida</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
        }

        .contenedor {
            width: 400px;
            height: 700px;
            position: relative;
            background-color: #ffd829;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-family: 'Anton', sans-serif;
        }

        .palmera {
            width: 450px;
            height: 450px;
            position: absolute;
            top: -100px;
            right: -150px;
            z-index: 2;
            background-image: url('img/hoja.png');
            background-size: contain;
            background-repeat: no-repeat;
            transform-origin: top right;
            transform: rotate(-15deg);
            animation: anim-palmera-v2 6s ease-in-out infinite; 
        }

        .trozo-cae {
            position: absolute;
            z-index: 1;
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0;
        }
        
        .c1 { width: 150px; height: 150px; background-image: url('img/coco.png'); top: 10%; left: 10%; animation: caer_flotar_irse 6s infinite 0s; }
        .c2 { width: 200px; height: 200px; background-image: url('img/trozo.png'); top: 25%; right: 15%; animation: caer_flotar_irse 6s infinite 0.1s; }
        .c3 { width: 175px; height: 175px; background-image: url('img/trozo.png'); top: 60%; left: -10px; animation: caer_flotar_irse 6s infinite 0.05s; }
        .c4 { width: 250px; height: 250px; background-image: url('img/trozo.png'); top: 75%; right: 10%; animation: caer_flotar_irse 6s infinite 0.2s; }

        .escena-1 {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            text-align: center;
            z-index: 10;
            opacity: 0;
            animation: anim-escena1 6s infinite; 
        }
        .texto-probaste {
            color: #3e2723;
            font-size: 32px;
            font-weight: 500;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }
        .texto-nuevo {
            color: white;
            font-size: 85px;
            font-weight: 700;
            line-height: 0.95;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.05);
        }

        .escena-final {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 12;
        }

        .grupo-texto-final {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            animation: slide-in-right 6s infinite;
            z-index: 13;
        }

        .palabra {
            font-size: 85px;
            font-weight: 700;
            color: white;
            line-height: 0.9;
        }
        .palabra-coco { animation: mover-coco 6s infinite; }
        .palabra-vainilla { animation: mover-vainilla 6s infinite; }

        .signo-mas {
            color: #3e2723;
            font-size: 65px;
            font-weight: 700;
            line-height: 0.8;
            margin: 5px 0;
            animation: ocultar-mas 6s infinite;
        }

        .coco-central-img {
            position: absolute;
            width: 350px;
            height: 350px;
            background-image: url('img/coco.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            filter: drop-shadow(0px 20px 15px rgba(0,0,0,0.3));
            z-index: 12;
            opacity: 0;
            animation: pop-coco-central 6s infinite;
        }

        @keyframes anim-palmera-v2 {
            0%   { transform: rotate(-15deg) translateY(0px); }
            25%  { transform: rotate(-25deg) translateY(-10px); }
            50%  { transform: rotate(-15deg) translateY(0px); }
            75%  { transform: rotate(0deg) translateY(20px); }
            100% { transform: rotate(-15deg) translateY(0px); }
        }

        @keyframes caer_flotar_irse {
            0%   { transform: translateY(-400px) rotate(0deg); opacity: 0; }
            10%  { transform: translateY(0px) rotate(10deg); opacity: 1; }
            40%  { transform: translateY(20px) rotate(25deg); opacity: 1; }
            55%  { transform: translateY(900px) rotate(50deg); opacity: 0; }
            100% { transform: translateY(900px); opacity: 0; }
        }

        @keyframes anim-escena1 {
            0%   { opacity: 0; transform: translateX(-400px) translateY(-50%); }
            8%   { opacity: 1; transform: translateX(0) translateY(-50%); }
            40%  { opacity: 1; transform: translateX(0) translateY(-50%); } 
            48%  { opacity: 0; transform: translateX(-400px) translateY(-50%); } 
            100% { opacity: 0; transform: translateX(-400px) translateY(-50%); }
        }
        
        @keyframes slide-in-right {
            0%, 40%   { opacity: 0; transform: translateX(400px); }
            48%, 100% { opacity: 1; transform: translateX(0); }
        }

        @keyframes mover-coco {
            0%, 68%   { transform: translateY(0); } 
            72%, 100% { transform: translateY(-165px); } 
        }

        @keyframes mover-vainilla {
            0%, 68%   { transform: translateY(0); }
            72%, 100% { transform: translateY(165px); } 
        }

        @keyframes ocultar-mas {
            0%, 66%   { transform: scale(1); opacity: 1; }
            70%, 100% { transform: scale(0); opacity: 0; } 
        }

        @keyframes pop-coco-central {
            0%, 68%   { opacity: 0; transform: scale(0); }
            73%       { opacity: 1; transform: scale(1.1); }
            76%, 100% { opacity: 1; transform: scale(1); }
        }

    </style>
</head>
<body>
    <div class="contenedor">
        
        <div class="palmera"></div>
        
        <div class="trozo-cae c1"></div>
        <div class="trozo-cae c2"></div>
        <div class="trozo-cae c3"></div>
        <div class="trozo-cae c4"></div>

        <div class="escena-1">
            <div class="texto-probaste">YA PROBASTE</div>
            <div class="texto-nuevo">EL NUEVO<br>SABOR</div>
        </div>

        <div class="escena-final">
            
            <div class="grupo-texto-final">
                <div class="palabra palabra-coco">COCO</div>
                <div class="signo-mas">+</div>
                <div class="palabra palabra-vainilla">VAINILLA</div>
            </div>
            
            <div class="coco-central-img"></div>
            
        </div>

    </div>
</body>
</html>
